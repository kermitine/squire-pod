name: rocket-pod

services:
  rocket-pod:
    container_name: rocket-pod
    hostname: escapepod
    image: rocket-pod:latest
    pull_policy: never
    network_mode: host
    build:
      context: .
      dockerfile: dockerfile
    restart: unless-stopped
    environment:
      WIREPOD_DATA_DIR: /data
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "8084:8084"
    volumes:
      - ./rocket-pod-data:/data
      - ./rocket-pod-images:/images
      - ./rocket-pod-productivity-images:/opt/rocket-pod/chipper/productivity-images
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8080/ok" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
